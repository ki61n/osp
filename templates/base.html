<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        *{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: none;

        }
        .bg{
            background-image: linear-gradient(45deg,rgb(136, 136, 214),rgb(197, 109, 197));
            color: white;
        }
        .bg:hover{
            background-image: linear-gradient(45deg,rgb(197, 78, 197),rgb(117, 117, 210));
            color: white;

        }
        .main-container{
            background-image: linear-gradient(45deg,rgb(149, 149, 236),rgb(199, 125, 199));
            


        }
        .container{
            min-height: 94.5svh;
;
        }
        .container-fluid{
            min-height: 94.5svh;
        }
        .content-wrapper{
            padding: 20px;
            border:1px solid rgba(255, 253, 253, 0.3);
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow:inset 0 0 10px 10px rgba(255, 254, 254, 0.267);
        }
        .mx-w-500{
            max-width: 500px;
            margin: 0 auto;
        }
        .grid{
            display: grid;
            gap: 10px;
        }
        small{
            color: red;
        }
        h6{
            text-align: center;
        }


        @media (width < 500px) {
            .content-wrapper{
                padding: 20px 5px 20px 5px;
                border-radius: 5px;
            }
            
        }


    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{% url 'home' %}">Home</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav w-100">
                <li class="nav-item"><a class="nav-link" href="{% url 'signin' %}">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'regcustomer' %}">Sign Up</a></li>
                <li class="nav-item ml-auto"><a class="nav-link" href="{% url 'regworker' %}">Become a Service Provider</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        {% block content %}
    
    {% endblock %}
    </div>
    
</body>
</html>
