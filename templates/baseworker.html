    <style>
       *{
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        scrollbar-width: none;
       }
        .main-content{
            background-image: linear-gradient(45deg,rgb(149, 149, 236),rgb(199, 125, 199));
            min-height: 91svh;
        }
        .blur{
            filter: blur(2px);
        }
        
        .align-center{
            align-items: center;
        }
        @media (width < 500px) {
            .align-center{
                align-items: flex-start;
            }}
            
        
        .container-fluid{
            min-height: 91.2svh;
        }
        .container{
            min-height: 91.2svh;
        }
        h1{
            text-align: center;
        }
        /* .btn{
            border:1px solid rgba(255, 253, 253, 0.3);
            box-shadow:inset 0 0 10px 5px rgba(255, 254, 254, 0.267);
            position: relative;

        }
        .btn:after{
            content:'';
            position: absolute;
            inset: 5px 2px 2px 5px;
            border-radius: 5px;
            background-color: rgba(154, 154, 154, 0.225);
            box-shadow: 0 0 5px 4px rgba(255, 254, 254, 0.267);
            border: 1px solid rgba(255, 253, 253, 0.3);

        } */
          
        .proimg{
            background-position: top;
            background-repeat: no-repeat;
            background-size: cover;
        }
        
        .content-wrapper{
            padding: 20px;
            border:1px solid rgba(255, 253, 253, 0.3);
            background-color: rgba(255, 254, 254, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 10px 5px rgba(0, 0, 0, 0.267);
        }
        .mx-w-500{
            max-width: 500px;
            margin: 0 auto;
        }
        .grid{
            display: grid;
            gap: 10px;
        }
        small{
            color: red;
        }
        h6{
            text-align: center;
        }

        .relative{
            position:relative;

            .s{
                position:absolute;
                
                border-radius:5px;
                bottom:-15px;
                right:10px;
                color:#7CAAD6;
                border:1px solid #7CAAD6;
                padding-inline:5px;
            }

            .s:hover{
                color: black;
                border-color:rgb(48, 47, 47);
            }


        }


        @media (width < 500px) {
            .content-wrapper{
                padding: 20px 5px 20px 5px;
                border-radius: 5px;
            }
            
        }

        
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light border">
        <a class="navbar-brand" href="{% url 'worker' %}">Home</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav w-100 align-center">
                <li class="nav-item"><a class="nav-link relative" href="{% url 'viewtaskrequest' %}">view services requests <span class="s"> {{reqcount}}</span></a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'viewcurtask' %}">current tasks</a></li>
                <li class="nav-item dropdown ml-sm-auto mr-4">
                    <a class="nav-link dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        {% if user.image %}
                        <div class="d-flex align-items-center">
                            <div class="proimg" style="width: 40px; height: 40px; border-radius: 50% ; background-image: url('{{user.image.url}}'); margin-right: 10px;"></div> 
                        </div>
                        {% else %}
                        profile
                        {% endif %}
                    </a>
                    <div class="dropdown-menu" aria-labelledby="dropdownMenuLink">
                        <a class="dropdown-item" href="{% url 'profileworker' %}">view profile</a>
                        <a class="dropdown-item" href="{% url 'edit_worker' %}">edit profile</a>
                        <a class="dropdown-item" href="{% url 'profile_content' %}"> profile content</a>
                        <a class="dropdown-item" href="{% url 'view_content' %}"> view content</a>
                    </div>
                </li>
                <li class="nav-item "><a class="nav-link" href="{% url 'out' %}">Logout</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="main-content">
    {% block content %}{% endblock %}
<div class="text-white">
    
    {% include 'workerfooter.html' %}
    
</div>
    </div>
