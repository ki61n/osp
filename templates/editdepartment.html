{% extends 'baseadmin.html' %}
{% block content %}
{% load static %}




<div class="container grid  align-items-center">
    <div class="content-wrapper">
        <h1>Edit department</h1>
<h6>{% for i in messages %}
{{i}}
{% endfor %}</h6>

<form action="{% url 'e_dep' data.id %}" method="post" enctype="multipart/form-data" class="grid">
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Department Name</label>
        <input type="text" name="name" id="name" value="{{data.name}}" class="form-control">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" name="description" id="description" value="{{data.description}}"  class="form-control">
    </div>
    <div class="form-group">
        <label for="image">Department Image</label>
        <input type="file" name="image" id="image" class="form-control">
    </div>
    <input type="submit" value="update"  class="form-control btn btn-info">
</form>

    </div>
</div>
{% endblock %}
