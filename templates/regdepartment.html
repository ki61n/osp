{% extends 'baseadmin.html' %}
{% block content %}
{% load static %}



<div class="container grid  align-items-center">
    <div class="content-wrapper">
        <h1 class="mb-3">Register Department</h1>
<h6>{% for i in messages %}
{{i}}
{% endfor %}</h6>

<form action="{% url 'r_dept' %}" method="post" enctype="multipart/form-data" class="grid">
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Department Name</label>
        <input type="text" name="name" id="name" value="{{data.name}}" placeholder="Department name" class="form-control">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" name="description" id="description" value="{{data.description}}" placeholder="Description"  class="form-control">
    </div>
    <div class="form-group">
        <label for="image">Department Image</label>
        <input type="file" name="image" id="image" value="{{data.image}}" class="form-control">
    </div>
    <input type="submit" value="Register"  class="form-control btn btn-info">
</form>

    </div>
</div>

{% endblock %}
