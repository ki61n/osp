{% extends 'baseuser.html' %}
{% block content %}
{% load static %}

<div class="container grid  align-items-center">
    <div class="content-wrapper">
        <h1>Register task</h1>
        <h2>{{udata.department.name}}</h2>

<h2>{% for i in messages %}{{i}}{% endfor %}</h2>

<form action="{% url 'regTask' data.id %}" method="post" enctype="multipart/form-data" class="grid">
    {% csrf_token %}


    <!-- Use the provider's service id for the form and show the service name -->
    <div class="form-group">
        <label for="service_display">Service</label>
        <input type="hidden" name="services" value="{{data.service.id}}">   <!-- look up-->
        <input type="text" id="service_display" class="form-control" value="{{data.service.name}}" disabled>
    </div>

    <div class="form-group">
        <label for="details">Task Details</label>
        <input type="text" name="details" id="details" placeholder="details" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" placeholder="location" value="{{udata.address}}" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="date">Date</label>
        <input type="date" name="date" id="date" class="form-control" required>
    </div>
    <script>
        $(document).ready(function(){
            var today = new Date().toISOString().split('T')[0];
            $('input[name="date"]').attr('min', today);
        });
    </script>
    <div class="form-group">
        <label for="image">Image / Reference</label>
        <input type="file" name="image" id="image" type="image/*" class="form-control" required>
    </div>
    <input type="submit" class="btn btn-info">



</form>
    </div>
</div>
{% endblock %}
